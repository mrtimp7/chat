<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Chat</title>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #313338; color: #dbdee1; overflow: hidden; }
        .app-container { display: flex; height: 100vh; }
        
        .sidebar { width: 240px; background-color: #2b2d31; display: flex; flex-direction: column; }
        .server-header { padding: 12px 16px; font-weight: bold; color: white; border-bottom: 1px solid #1f2124; box-shadow: 0 1px 0 rgba(0,0,0,0.1); }
        .user-welcome { padding: 10px 16px; color: #ffffff; font-size: 13px; background: #232428; margin-bottom: 5px; border-bottom: 1px solid #1f2124; }
        .channel-name { padding: 10px 16px; color: white; background: #3f4147; margin: 8px; border-radius: 4px; font-size: 14px; }

        .chat-area { flex: 1; display: flex; flex-direction: column; }
        .chat-header { height: 48px; display: flex; align-items: center; padding: 0 16px; border-bottom: 1px solid #1f2124; font-weight: bold; color: white; }
        
        #messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; }
        .message-wrapper { display: flex; margin-bottom: 18px; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        .avatar { width: 40px; height: 40px; border-radius: 50%; margin-right: 16px; object-fit: cover; background: #eee; }
        .msg-content { display: flex; flex-direction: column; }
        .msg-user { color: #ffffff; font-weight: 500; font-size: 1rem; margin-bottom: 2px; }
        .msg-text { color: #dbdee1; word-wrap: break-word; line-height: 1.375rem; }

        .input-area { padding: 0 20px 24px 20px; }
        .input-box { background: #383a40; border-radius: 8px; padding: 11px 16px; }
        #myMessage { background: transparent; border: none; color: #dbdee1; width: 100%; outline: none; font-size: 1rem; }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="sidebar">
            <div class="server-header">Chat</div>
            <div class="user-welcome">Hoş geldin, {{ user.username.capitalize() }}</div>
            <div class="channel-name"># genel-sohbet</div>
        </div>
        <div class="chat-area">
            <div class="chat-header"># genel-sohbet</div>
            <div id="messages"></div>
            <div class="input-area">
                <div class="input-box">
                    <input id="myMessage" type="text" placeholder="Mesaj gönder..." autocomplete="off">
                </div>
            </div>
        </div>
    </div>

    <script>
        var socket = io();

        socket.on('message', function(data) {
            $('#messages').append(`
                <div class="message-wrapper">
                    <img src="${data.avatar}" class="avatar" onerror="this.src='https://api.dicebear.com/7.x/bottts/svg?seed=error'">
                    <div class="msg-content">
                        <div class="msg-user">${data.user}</div>
                        <div class="msg-text">${data.msg}</div>
                    </div>
                </div>
            `);
            $("#messages").scrollTop($("#messages")[0].scrollHeight);
        });

        $('#myMessage').on('keypress', function(e) {
            if(e.which == 13) {
                var text = $(this).val().trim();
                if(text !== "") {
                    socket.emit('message', {msg: text});
                    $(this).val('');
                }
            }
        });
    </script>
</body>
</html>
