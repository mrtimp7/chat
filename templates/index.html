<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Chat</title>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
        /* Genel Tasarım */
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #313338; color: #dbdee1; overflow: hidden; }
        .app-container { display: flex; height: 100vh; }
        
        /* Sol Menü (Sidebar) */
        .sidebar { width: 240px; background-color: #2b2d31; display: flex; flex-direction: column; }
        .server-header { padding: 12px 16px; font-weight: bold; color: white; border-bottom: 1px solid #1f2124; box-shadow: 0 1px 0 rgba(0,0,0,0.1); }
        .user-welcome { padding: 10px 16px; color: #ffffff; font-size: 13px; background: #232428; border-bottom: 1px solid #1f2124; }
        .channel-name { padding: 10px 16px; color: white; background: #3f4147; margin: 8px; border-radius: 4px; font-size: 14px; cursor: pointer; }

        /* Profil Paneli (Sol Alt) */
        .sidebar-footer { background: #232428; padding: 8px 12px; display: flex; align-items: center; border-top: 1px solid #1f2124; margin-top: auto; }
        .user-info { display: flex; align-items: center; flex: 1; min-width: 0; }
        .user-info img { width: 32px; height: 32px; border-radius: 50%; margin-right: 8px; object-fit: cover; background: #313338; }
        .user-name-tag { font-size: 13px; font-weight: bold; color: white; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .footer-btns { display: flex; gap: 8px; align-items: center; }
        .icon-btn { cursor: pointer; font-size: 16px; opacity: 0.7; transition: 0.2s; text-decoration: none; }
        .icon-btn:hover { opacity: 1; }

        /* Chat Alanı */
        .chat-area { flex: 1; display: flex; flex-direction: column; background-color: #313338; }
        .chat-header { height: 48px; display: flex; align-items: center; padding: 0 16px; border-bottom: 1px solid #1f2124; font-weight: bold; color: white; }
        
        #messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; }
        
        /* Mesaj Balonları */
        .message-wrapper { display: flex; margin-bottom: 18px; animation: fadeIn 0.2s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        
        .avatar { width: 40px; height: 40px; border-radius: 50%; margin-right: 16px; object-fit: cover; flex-shrink: 0; }
        .msg-content { display: flex; flex-direction: column; }
        .msg-user { color: #ffffff; font-weight: 600; font-size: 1rem; margin-bottom: 2px; }
        .msg-text { color: #dbdee1; word-wrap: break-word; line-height: 1.375rem; white-space: pre-wrap; }
        .msg-img { max-width: 400px; max-height: 300px; border-radius: 8px; margin-top: 5px; border: 1px solid #232428; }

        /* Mesaj Yazma Alanı */
        .input-area { padding: 0 20px 24px 20px; }
        .input-box { background: #383a40; border-radius: 8px; padding: 11px 16px; }
        #myMessage { background: transparent; border: none; color: #dbdee1; width: 100%; outline: none; font-size: 1rem; }

        /* Ayarlar Modalı */
        #settingsModal { display:none; position:fixed; z-index:100; left:0; top:0; width:100%; height:100%; background:rgba(0,0,0,0.85); backdrop-filter: blur(3px); }
        .modal-content { background:#313338; margin:10% auto; padding:24px; border-radius:8px; width:320px; color:white; box-shadow: 0 8px 24px rgba(0,0,0,0.5); }
        .modal-content h3 { margin-top: 0; color: #fff; }
        .modal-content label { font-size: 12px; font-weight: bold; color: #b5bac1; text-transform: uppercase; }
        .modal-content input { width:100%; padding:10px; margin: 8px 0 20px 0; background:#1e1f22; border:none; color:white; border-radius:4px; box-sizing: border-box; outline: none; }
        .modal-content input:focus { box-shadow: 0 0 0 2px #5865f2; }
        .save-btn { width:100%; background:#5865f2; color:white; border:none; padding:10px; border-radius:4px; cursor:pointer; font-weight: bold; }
        .save-btn:hover { background: #4752c4; }
        .cancel-btn { width:100%; background:transparent; color:white; border:none; margin-top:10px; cursor:pointer; font-size: 13px; opacity: 0.7; }
        
        /* Scrollbar */
        #messages::-webkit-scrollbar { width: 8px; }
        #messages::-webkit-scrollbar-track { background: transparent; }
        #messages::-webkit-scrollbar-thumb { background: #1a1d20; border-radius: 10px; }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="sidebar">
            <div class="server-header">Chat</div>
            <div class="user-welcome">Hoş geldin, {{ user.username.capitalize() }}</div>
            <div class="channel-name"># genel-sohbet</div>
            
            <div class="sidebar-footer">
                <div class="user-info">
                    <img src="{{ user.avatar }}" id="myAvatarDisplay">
                    <div class="user-name-tag">{{ user.username.capitalize() }}</div>
                </div>
                <div class="footer-btns">
                    <div class="icon-btn" title="Ayarlar" onclick="document.getElementById('settingsModal').style.display='block'">⚙️</div>
                    <a href="/logout" class="icon-btn" title="Çıkış Yap">❌</a>
                </div>
            </div>
        </div>

        <div class="chat-area">
            <div class="chat-header"># genel-sohbet</div>
            <div id="messages">
                {% for m in old_messages %}
                <div class="message-wrapper">
                    <img src="{{ m.avatar }}" class="avatar">
                    <div class="msg-content">
                        <div class="msg-user">{{ m.user }}</div>
                        {% if m.msg_type == 'image' %}
                            <img src="{{ m.content }}" class="msg-img">
                        {% else %}
                            <div class="msg-text">{{ m.content }}</div>
                        {% endif %}
                    </div>
                </div>
                {% endfor %}
            </div>
            <div class="input-area">
                <div class="input-box">
                    <input id="myMessage" type="text" placeholder="#genel-sohbet kanalına mesaj gönder" autocomplete="off">
                </div>
            </div>
        </div>
    </div>

    <div id="settingsModal">
        <div class="modal-content">
            <h3>Kullanıcı Ayarları</h3>
            <form action="/update_profile" method="POST">
                <label>Kullanıcı Adı</label>
                <input type="text" name="username" value="{{ user.username }}">
                
                <label>Yeni Şifre (Değişmeyecekse boş bırak)</label>
                <input type="password" name="password">
                
                <label>Profil Fotoğrafı URL</label>
                <input type="text" name="avatar_url" value="{{ user.avatar }}">
                
                <button type="submit" class="save-btn">Değişiklikleri Kaydet</button>
                <button type="button" class="cancel-btn" onclick="document.getElementById('settingsModal').style.display='none'">Vazgeç</button>
            </form>
        </div>
    </div>

    <script>
        var socket = io();

        // Mesaj Alma
        socket.on('message', function(data) {
            let contentHtml = '';
            if(data.type === 'image') {
                contentHtml = `<img src="${data.content}" class="msg-img">`;
            } else {
                contentHtml = `<div class="msg-text">${data.content}</div>`;
            }

            $('#messages').append(`
                <div class="message-wrapper">
                    <img src="${data.avatar}" class="avatar">
                    <div class="msg-content">
                        <div class="msg-user">${data.user}</div>
                        ${contentHtml}
                    </div>
                </div>
            `);
            $("#messages").scrollTop($("#messages")[0].scrollHeight);
        });

        // Metin Mesajı Gönderme
        $('#myMessage').on('keypress', function(e) {
            if(e.which == 13) {
                var text = $(this).val().trim();
                if(text !== "") {
                    socket.emit('message', {content: text, type: 'text'});
                    $(this).val('');
                }
            }
        });

        // Resim Yapıştırma (CTRL+V)
        document.onpaste = function(event) {
            var items = (event.clipboardData || event.originalEvent.clipboardData).items;
            for (var index in items) {
                var item = items[index];
                if (item.kind === 'file' && item.type.indexOf('image/') !== -1) {
                    var blob = item.getAsFile();
                    var reader = new FileReader();
                    reader.onload = function(e) {
                        socket.emit('message', {content: e.target.result, type: 'image'});
                    };
                    reader.readAsDataURL(blob);
                }
            }
        };

        // Sayfa açıldığında en alta kaydır
        $(document).ready(function() {
            $("#messages").scrollTop($("#messages")[0].scrollHeight);
        });
    </script>
</body>
</html>
