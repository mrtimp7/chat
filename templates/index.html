<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Chat</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#5865f2">
    <link rel="icon" href="/static/icons/icon-192.svg" type="image/svg+xml">
    <link rel="manifest" href="/manifest.webmanifest">
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
        :root {
            --bg-main: #313338;
            --bg-panel: #2b2d31;
            --bg-soft: #383a40;
            --bg-hover: rgba(255, 255, 255, 0.04);
            --bg-footer: #232428;
            --line: #1f2124;
            --text-main: #dbdee1;
            --text-soft: #b5bac1;
            --text-dim: #949ba4;
            --accent: #5865f2;
            --danger: #ed4245;
            --success: #23a55a;
        }

        * { box-sizing: border-box; }
        html, body { margin: 0; padding: 0; height: 100%; }
        body {
            font-family: "Segoe UI", Tahoma, sans-serif;
            background: var(--bg-main);
            color: var(--text-main);
            overflow: hidden;
        }

        .app-container {
            display: grid;
            grid-template-columns: 240px 1fr 240px;
            height: 100vh;
        }

        .sidebar,
        .member-list {
            background: var(--bg-panel);
            min-width: 0;
        }

        .sidebar {
            display: flex;
            flex-direction: column;
            border-right: 1px solid var(--line);
        }

        .member-list {
            border-left: 1px solid var(--line);
            padding: 16px 12px;
            overflow-y: auto;
        }

        .panel-header,
        .chat-header {
            height: 48px;
            display: flex;
            align-items: center;
            padding: 0 16px;
            border-bottom: 1px solid var(--line);
            font-weight: 700;
            color: #fff;
        }

        .channel-chip {
            margin: 12px;
            padding: 10px 12px;
            border-radius: 8px;
            background: #3f4147;
            color: #fff;
            font-size: 14px;
        }

        .utility-btn {
            margin: 0 12px 10px;
            border: none;
            border-radius: 8px;
            padding: 10px 12px;
            background: var(--accent);
            color: #fff;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
        }

        .utility-btn.secondary {
            background: #4e5058;
        }

        .sidebar-footer {
            margin-top: auto;
            padding: 10px;
            background: var(--bg-footer);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .sidebar-footer img {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            object-fit: cover;
            flex-shrink: 0;
        }

        .sidebar-user {
            flex: 1;
            min-width: 0;
        }

        .sidebar-user strong {
            display: block;
            font-size: 13px;
            color: #fff;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .sidebar-actions {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .sidebar-action {
            color: var(--text-soft);
            text-decoration: none;
            cursor: pointer;
            font-size: 16px;
        }

        .sidebar-action:hover {
            color: #fff;
        }

        .chat-area {
            display: flex;
            flex-direction: column;
            min-width: 0;
        }

        #messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }

        .message-wrapper {
            position: relative;
            display: flex;
            gap: 14px;
            padding: 8px 10px;
            margin-bottom: 4px;
            border-radius: 8px;
        }

        .message-wrapper:hover {
            background: var(--bg-hover);
        }

        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            object-fit: cover;
            flex-shrink: 0;
            background: #202225;
        }

        .msg-content {
            min-width: 0;
            flex: 1;
        }

        .msg-user {
            color: #fff;
            font-weight: 600;
            font-size: 15px;
            margin-bottom: 4px;
        }

        .msg-text {
            color: var(--text-main);
            white-space: pre-wrap;
            word-break: break-word;
            line-height: 1.45;
        }

        .msg-media {
            display: block;
            max-width: 420px;
            max-height: 320px;
            width: auto;
            border-radius: 10px;
            border: 1px solid #232428;
            margin: 6px 0 0;
            cursor: pointer;
            background: #202225;
        }

        .msg-caption {
            color: var(--text-soft);
            font-size: 14px;
            margin-top: 8px;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .reply-box {
            margin-bottom: 8px;
            padding: 6px 10px;
            border-left: 2px solid var(--accent);
            border-radius: 6px;
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-soft);
            font-size: 12px;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .msg-actions {
            position: absolute;
            top: 6px;
            right: 10px;
            display: none;
            gap: 8px;
            padding: 6px 8px;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: var(--bg-panel);
        }

        .message-wrapper:hover .msg-actions {
            display: flex;
        }

        .action-btn {
            cursor: pointer;
            font-size: 14px;
            opacity: 0.78;
            user-select: none;
        }

        .action-btn:hover {
            opacity: 1;
        }

        .input-section {
            padding: 0 20px 20px;
        }

        .typing-info {
            height: 20px;
            margin-bottom: 4px;
            color: var(--text-soft);
            font-size: 12px;
        }

        .reply-active-bar {
            display: none;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            padding: 8px 12px;
            border: 1px solid var(--accent);
            border-radius: 10px 10px 0 0;
            background: var(--bg-panel);
            color: var(--text-soft);
            font-size: 12px;
        }

        #preview-area {
            display: none;
            align-items: center;
            gap: 14px;
            margin-bottom: 8px;
            padding: 10px 12px;
            border: 1px solid var(--accent);
            border-radius: 10px 10px 0 0;
            background: var(--bg-panel);
        }

        .prev-img {
            width: 64px;
            height: 64px;
            border-radius: 8px;
            object-fit: cover;
            background: #202225;
        }

        .upload-meta {
            flex: 1;
            min-width: 0;
        }

        .upload-title {
            font-size: 12px;
            color: #fff;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .upload-stats {
            margin-top: 6px;
            font-size: 12px;
            color: var(--text-soft);
        }

        .upload-progress {
            width: 100%;
            height: 8px;
            margin-top: 8px;
            border-radius: 999px;
            overflow: hidden;
            background: #1e1f22;
        }

        .upload-progress-bar {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #5865f2, #7a84ff);
            transition: width 0.12s ease;
        }

        .preview-cancel {
            border: none;
            background: none;
            color: var(--danger);
            cursor: pointer;
        }

        .input-wrapper {
            display: flex;
            align-items: center;
            gap: 12px;
            min-height: 46px;
            padding: 0 14px;
            border-radius: 10px;
            background: var(--bg-soft);
        }

        .plus-btn {
            font-size: 24px;
            color: var(--text-soft);
            cursor: pointer;
            user-select: none;
        }

        .plus-btn:hover {
            color: #fff;
        }

        #myMessage {
            flex: 1;
            min-width: 0;
            border: none;
            outline: none;
            background: transparent;
            color: #fff;
            padding: 12px 0;
            font-size: 15px;
        }

        .member-title {
            margin-bottom: 14px;
            color: var(--text-dim);
            font-size: 12px;
            font-weight: 700;
        }

        .member-item {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 12px;
        }

        .member-item img {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            object-fit: cover;
        }

        .member-name {
            flex: 1;
            min-width: 0;
            font-size: 14px;
            color: var(--text-main);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .status-online {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--success);
            flex-shrink: 0;
        }

        #lightbox {
            position: fixed;
            inset: 0;
            z-index: 1000;
            display: none;
            justify-content: center;
            align-items: center;
            background: rgba(0, 0, 0, 0.92);
        }

        #lightbox img,
        #lightbox video {
            max-width: 92%;
            max-height: 92%;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.55);
        }

        #settingsModal {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 900;
            background: rgba(0, 0, 0, 0.8);
        }

        .modal-content {
            width: min(320px, calc(100vw - 32px));
            margin: 10vh auto 0;
            padding: 24px;
            border-radius: 12px;
            background: var(--bg-main);
            color: #fff;
        }

        .modal-content h3 {
            margin: 0 0 14px;
        }

        .modal-content input {
            width: 100%;
            margin: 10px 0;
            padding: 10px 12px;
            border: none;
            border-radius: 8px;
            outline: none;
            background: #1e1f22;
            color: #fff;
        }

        .modal-content button {
            width: 100%;
            padding: 10px 12px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        .save-btn {
            margin-top: 6px;
            background: var(--accent);
            color: #fff;
        }

        .cancel-btn {
            margin-top: 8px;
            background: transparent;
            color: var(--text-main);
        }

        @media (max-width: 920px) {
            .app-container {
                grid-template-columns: 240px 1fr;
            }

            .member-list {
                display: none;
            }
        }

        @media (max-width: 700px) {
            .app-container {
                grid-template-columns: 1fr;
            }

            .sidebar {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <div class="panel-header">Chat</div>
            <div class="channel-chip"># genel-sohbet</div>
            <button id="notify-btn" class="utility-btn">Bildirimleri Aç</button>
            <button id="install-btn" class="utility-btn secondary" style="display:none;">PC Uygulaması Olarak Yükle</button>

            <div class="sidebar-footer">
                <img src="{{ user.avatar }}" alt="Profil">
                <div class="sidebar-user">
                    <strong>{{ user.username.capitalize() }}</strong>
                </div>
                <div class="sidebar-actions">
                    <span class="sidebar-action" id="settings-toggle" title="Ayarlar">⚙</span>
                    <a class="sidebar-action" href="/logout" title="Çıkış Yap">⎋</a>
                </div>
            </div>
        </aside>

        <main class="chat-area">
            <div class="chat-header"># genel-sohbet</div>

            <div id="messages">
                {% for m in old_messages %}
                    <script>
                        $(function () {
                            renderMessage({
                                id: {{ m.id }},
                                user: {{ m.user|tojson }},
                                content: {{ m.content|tojson }},
                                caption: {{ m.caption|tojson }},
                                avatar: {{ m.avatar|tojson }},
                                type: {{ m.msg_type|tojson }},
                                reply_to: {{ m.reply_to|tojson }}
                            });
                        });
                    </script>
                {% endfor %}
            </div>

            <div class="input-section">
                <div class="typing-info" id="typing-box"></div>

                <div id="reply-bar" class="reply-active-bar">
                    <span id="reply-text"></span>
                    <span id="reply-cancel" style="cursor:pointer;">✕</span>
                </div>

                <div id="preview-area">
                    <img id="prev-box" class="prev-img" alt="Önizleme">
                    <div class="upload-meta">
                        <div id="prev-name" class="upload-title"></div>
                        <div id="upload-stats" class="upload-stats"></div>
                        <div class="upload-progress">
                            <div id="upload-progress-bar" class="upload-progress-bar"></div>
                        </div>
                    </div>
                    <button id="preview-cancel" class="preview-cancel" type="button">Vazgeç</button>
                </div>

                <div class="input-wrapper">
                    <label class="plus-btn" for="file-in">+</label>
                    <input type="file" id="file-in" hidden accept="image/*,video/*">
                    <input id="myMessage" type="text" placeholder="Mesaj gönder..." autocomplete="off">
                </div>
            </div>
        </main>

        <aside class="member-list" id="member-list">
            <div class="member-title">ÇEVRİMİÇİ ÜYELER</div>
        </aside>
    </div>

    <div id="lightbox"></div>

    <div id="settingsModal">
        <div class="modal-content">
            <h3>Ayarlar</h3>
            <form action="/update_profile" method="POST">
                <input type="text" name="username" value="{{ user.username }}" placeholder="Kullanıcı adı">
                <input type="password" name="password" placeholder="Yeni şifre">
                <input type="text" name="avatar_url" value="{{ user.avatar }}" placeholder="Profil foto URL">
                <button type="submit" class="save-btn">Kaydet</button>
                <button type="button" class="cancel-btn" id="settings-close">İptal</button>
            </form>
        </div>
    </div>

    <script>
        var socket = io();
        var selectedFile = null;
        var currentReply = null;
        var typingTimer = null;
        var lastMyId = null;
        var deferredInstallPrompt = null;
        var notificationIcon = "/static/icons/icon-192.svg";
        var notificationBatch = [];
        var notificationTimer = null;
        var notificationWindowMs = 3500;

        function escapeHtml(value) {
            return String(value ?? "")
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#39;");
        }

        function truncateText(text, limit) {
            var clean = String(text ?? "").replace(/\s+/g, " ").trim();
            return clean.length > limit ? clean.slice(0, limit) + "..." : clean;
        }

        function formatFileSize(bytes) {
            if (bytes < 1024 * 1024) {
                return (bytes / 1024).toFixed(1) + " KB";
            }
            return (bytes / (1024 * 1024)).toFixed(2) + " MB";
        }

        function updateUploadStatus(percent, file) {
            $("#upload-progress-bar").css("width", percent + "%");
            if (file) {
                $("#upload-stats").text(formatFileSize(file.size) + " • " + percent + "% yüklendi");
            } else {
                $("#upload-stats").text(percent + "% yüklendi");
            }
        }

        function cancelFile() {
            selectedFile = null;
            $("#file-in").val("");
            $("#preview-area").hide();
            $("#prev-box").attr("src", "").show();
            $("#prev-name").text("");
            $("#upload-stats").text("");
            $("#upload-progress-bar").css("width", "0%");
        }

        function handleFileSelection(file) {
            selectedFile = file;
            $("#preview-area").css("display", "flex");
            $("#upload-progress-bar").css("width", "0%");
            $("#prev-name").text(file.name || (file.type.startsWith("image/") ? "Görsel seçildi" : "Video seçildi"));
            if (file.type.startsWith("image/")) {
                $("#prev-box").attr("src", URL.createObjectURL(file)).show();
            } else {
                $("#prev-box").hide();
            }
            updateUploadStatus(0, file);
            $("#myMessage").focus();
        }

        function setReply(user, preview) {
            currentReply = user + ": " + preview;
            $("#reply-text").text("Yanıt: " + currentReply);
            $("#reply-bar").css("display", "flex");
            $("#myMessage").focus();
        }

        function cancelReply() {
            currentReply = null;
            $("#reply-bar").hide();
            $("#reply-text").text("");
        }

        function zoomMedia(sourceNode) {
            var $lightbox = $("#lightbox");
            var clone = $(sourceNode).clone();
            clone.removeAttr("style");
            clone.prop("controls", true);
            $lightbox.empty().append(clone).css("display", "flex");
        }

        function playNotificationSound() {
            try {
                var AudioCtx = window.AudioContext || window.webkitAudioContext;
                if (!AudioCtx) return;
                var audioContext = new AudioCtx();
                var oscillator = audioContext.createOscillator();
                var gainNode = audioContext.createGain();

                oscillator.type = "sine";
                oscillator.frequency.setValueAtTime(880, audioContext.currentTime);
                gainNode.gain.setValueAtTime(0.0001, audioContext.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.12, audioContext.currentTime + 0.01);
                gainNode.gain.exponentialRampToValueAtTime(0.0001, audioContext.currentTime + 0.35);
                oscillator.connect(gainNode);
                gainNode.connect(audioContext.destination);
                oscillator.start();
                oscillator.stop(audioContext.currentTime + 0.35);
                oscillator.onended = function () { audioContext.close(); };
            } catch (error) {}
        }

        async function requestDesktopNotifications() {
            if (!("Notification" in window)) {
                alert("Bu tarayıcı masaüstü bildirimi desteklemiyor.");
                return;
            }

            var permission = Notification.permission;
            if (permission !== "granted") {
                permission = await Notification.requestPermission();
            }

            if (permission === "granted") {
                $("#notify-btn").text("Bildirimler Açık");
            }
        }

        async function flushDesktopNotifications() {
            if (!notificationBatch.length) return;

            var count = notificationBatch.length;
            var latest = notificationBatch[notificationBatch.length - 1];
            var body = latest.body + (count > 1 ? " (x" + count + ")" : "");

            playNotificationSound();

            try {
                var registration = await navigator.serviceWorker.getRegistration();
                if (registration) {
                    await registration.showNotification(latest.title, {
                        body: body,
                        icon: notificationIcon,
                        badge: notificationIcon,
                        tag: "chat-grouped-message",
                        renotify: true
                    });
                } else {
                    var notification = new Notification(latest.title, {
                        body: body,
                        icon: notificationIcon,
                        tag: "chat-grouped-message"
                    });
                    notification.onclick = function () {
                        window.focus();
                        notification.close();
                    };
                }
            } catch (error) {}

            notificationBatch = [];
        }

        function queueDesktopNotification(data) {
            if (!("Notification" in window) || Notification.permission !== "granted") return;
            if (document.visibilityState === "visible" && document.hasFocus()) return;
            if (data.user.toLowerCase() === "{{ user.username.lower() }}") return;

            notificationBatch.push({
                title: data.user + " yeni mesaj gönderdi",
                body: data.type === "text"
                    ? data.content
                    : (data.caption || (data.type === "image" ? "Bir görsel gönderdi." : "Bir video gönderdi."))
            });

            if (notificationTimer) {
                clearTimeout(notificationTimer);
            }

            notificationTimer = setTimeout(function () {
                flushDesktopNotifications();
                notificationTimer = null;
            }, notificationWindowMs);
        }

        function renderMessage(data) {
            var isMe = data.user.toLowerCase() === "{{ user.username.lower() }}";
            if (isMe) lastMyId = data.id;

            var safeUser = escapeHtml(data.user);
            var safeAvatar = escapeHtml(data.avatar);
            var safeCaption = escapeHtml(data.caption || "");
            var safeReply = escapeHtml(data.reply_to || "");
            var previewText = truncateText(data.type === "text" ? data.content : (data.caption || data.type), 30);
            var mediaHtml = "";
            var bodyHtml = "";

            if (data.type === "image") {
                mediaHtml = '<img src="' + escapeHtml(data.content) + '" class="msg-media zoomable" alt="Görsel">';
                bodyHtml = mediaHtml + (safeCaption ? '<div class="msg-caption">' + safeCaption + '</div>' : "");
            } else if (data.type === "video") {
                mediaHtml = '<video class="msg-media zoomable" controls><source src="' + escapeHtml(data.content) + '"></video>';
                bodyHtml = mediaHtml + (safeCaption ? '<div class="msg-caption">' + safeCaption + '</div>' : "");
            } else {
                bodyHtml = '<div class="msg-text" id="t-' + data.id + '">' + escapeHtml(data.content).replace(/\n/g, "<br>") + '</div>';
            }

            var replyHtml = safeReply ? '<div class="reply-box">' + safeReply + '</div>' : "";
            var actionHtml = [
                '<div class="msg-actions">',
                '<span class="action-btn reply-action" data-user="' + safeUser + '" data-preview="' + escapeHtml(previewText) + '" title="Yanıtla">💬</span>',
                isMe ? '<span class="action-btn edit-action" data-id="' + data.id + '" title="Düzenle">✏️</span>' : '',
                isMe ? '<span class="action-btn delete-action" data-id="' + data.id + '" title="Sil">🗑️</span>' : '',
                '</div>'
            ].join("");

            $("#messages").append(
                '<div class="message-wrapper" id="msg-' + data.id + '">' +
                    '<img src="' + safeAvatar + '" class="avatar" alt="Avatar">' +
                    '<div class="msg-content">' +
                        replyHtml +
                        '<div class="msg-user">' + safeUser + '</div>' +
                        bodyHtml +
                    '</div>' +
                    actionHtml +
                '</div>'
            );

            $("#messages").scrollTop($("#messages")[0].scrollHeight);
        }

        function editMsg(id) {
            var oldText = $("#t-" + id).text();
            var newText = prompt("Mesajı düzenle:", oldText);
            if (newText && newText !== oldText) {
                socket.emit("edit_message", { id: id, content: newText });
            }
        }

        function deleteMsg(event, id) {
            if (event && event.shiftKey) {
                socket.emit("delete_message", { id: id });
                return;
            }
            if (confirm("Bu mesajı silmek istiyor musun?")) {
                socket.emit("delete_message", { id: id });
            }
        }

        function emitTypingPulse() {
            socket.emit("typing", { status: true });
            clearTimeout(typingTimer);
            typingTimer = setTimeout(function () {
                socket.emit("typing", { status: false });
            }, 1800);
        }

        if ("serviceWorker" in navigator) {
            navigator.serviceWorker.register("/service-worker.js");
        }

        fetch("/api/notification-icon")
            .then(function (response) { return response.json(); })
            .then(function (data) {
                if (data.icon) notificationIcon = data.icon;
            })
            .catch(function () {});

        window.addEventListener("beforeinstallprompt", function (event) {
            event.preventDefault();
            deferredInstallPrompt = event;
            $("#install-btn").show();
        });

        $("#install-btn").on("click", async function () {
            if (!deferredInstallPrompt) return;
            deferredInstallPrompt.prompt();
            await deferredInstallPrompt.userChoice;
            deferredInstallPrompt = null;
            $("#install-btn").hide();
        });

        $("#notify-btn").on("click", requestDesktopNotifications);
        $("#settings-toggle").on("click", function () { $("#settingsModal").show(); });
        $("#settings-close").on("click", function () { $("#settingsModal").hide(); });
        $("#reply-cancel").on("click", cancelReply);
        $("#preview-cancel").on("click", cancelFile);
        $("#lightbox").on("click", function () { $(this).hide().empty(); });

        $("#file-in").on("change", function (event) {
            var file = event.target.files[0];
            if (file) handleFileSelection(file);
        });

        document.onpaste = function (event) {
            var items = event.clipboardData ? event.clipboardData.items : [];
            for (var i = 0; i < items.length; i++) {
                var item = items[i];
                if (item.type.indexOf("image/") !== -1 || item.type.indexOf("video/") !== -1) {
                    var file = item.getAsFile();
                    if (file) {
                        handleFileSelection(file);
                        break;
                    }
                }
            }
        };

        $(document).on("keydown", function (event) {
            if (event.which === 38 && $("#myMessage").val() === "" && lastMyId) {
                editMsg(lastMyId);
            }
        });

        $(document).on("click", ".zoomable", function () {
            zoomMedia(this);
        });

        $(document).on("click", ".reply-action", function () {
            setReply(this.dataset.user, this.dataset.preview);
        });

        $(document).on("click", ".edit-action", function () {
            editMsg(Number(this.dataset.id));
        });

        $(document).on("click", ".delete-action", function (event) {
            deleteMsg(event, Number(this.dataset.id));
        });

        $("#myMessage").on("input", function () {
            emitTypingPulse();
        });

        $("#myMessage").on("keydown", function (event) {
            if (event.which !== 13) return;

            event.preventDefault();
            var text = $(this).val();

            if (selectedFile) {
                var file = selectedFile;
                if (file.size > 100 * 1024 * 1024) {
                    alert("Dosya 100 MB sınırını aşıyor.");
                    return;
                }

                var reader = new FileReader();
                reader.onprogress = function (progressEvent) {
                    if (progressEvent.lengthComputable) {
                        updateUploadStatus(Math.round((progressEvent.loaded / progressEvent.total) * 100), file);
                    }
                };
                reader.onload = function (loadEvent) {
                    updateUploadStatus(100, file);
                    socket.emit("message", {
                        content: loadEvent.target.result,
                        caption: text,
                        type: file.type.startsWith("image/") ? "image" : "video",
                        reply_to: currentReply
                    });
                    cancelFile();
                    cancelReply();
                    $("#myMessage").val("");
                };
                reader.readAsDataURL(file);
                return;
            }

            if (text.trim() !== "") {
                socket.emit("message", {
                    content: text,
                    type: "text",
                    reply_to: currentReply
                });
                $(this).val("");
                cancelReply();
            }
        });

        socket.on("message", function (data) {
            renderMessage(data);
            queueDesktopNotification(data);
        });

        socket.on("message_edited", function (data) {
            $("#t-" + data.id).text(data.content);
        });

        socket.on("message_deleted", function (data) {
            $("#msg-" + data.id).remove();
        });

        socket.on("update_users", function (users) {
            $("#member-list").html('<div class="member-title">ÇEVRİMİÇİ ÜYELER — ' + Object.keys(users).length + '</div>');
            for (var username in users) {
                $("#member-list").append(
                    '<div class="member-item">' +
                        '<img src="' + escapeHtml(users[username].avatar) + '" alt="Üye">' +
                        '<span class="member-name">' + escapeHtml(users[username].name) + '</span>' +
                        '<div class="status-online"></div>' +
                    '</div>'
                );
            }
        });

        socket.on("display_typing", function (data) {
            $("#typing-box").text(data.status ? data.user + " yazıyor..." : "");
        });

        if ("Notification" in window && Notification.permission === "granted") {
            $("#notify-btn").text("Bildirimler Açık");
        }
    </script>
</body>
</html>
