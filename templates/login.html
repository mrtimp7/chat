<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Chat Giriş</title>
    <link rel="icon" href="/static/icons/icon-192.svg" type="image/svg+xml">
    <style>
        * { box-sizing: border-box; }
        html, body { margin: 0; padding: 0; height: 100%; }
        body {
            display: grid;
            place-items: center;
            background:
                radial-gradient(circle at top, rgba(88, 101, 242, 0.18), transparent 34%),
                linear-gradient(180deg, #2a2d33 0%, #1f2125 100%);
            color: #fff;
            font-family: "Segoe UI", Tahoma, sans-serif;
        }

        .login-card {
            width: min(360px, calc(100vw - 32px));
            padding: 32px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 18px;
            background: rgba(49, 51, 56, 0.94);
            box-shadow: 0 18px 60px rgba(0, 0, 0, 0.35);
            backdrop-filter: blur(10px);
        }

        h3 {
            margin: 0 0 8px;
            font-size: 24px;
        }

        p {
            margin: 0 0 20px;
            color: #b5bac1;
            font-size: 13px;
            line-height: 1.5;
        }

        input {
            width: 100%;
            margin-bottom: 12px;
            padding: 12px 14px;
            border: none;
            border-radius: 10px;
            outline: none;
            background: #1e1f22;
            color: #fff;
            font-size: 14px;
        }

        button {
            width: 100%;
            margin-top: 4px;
            padding: 12px 14px;
            border: none;
            border-radius: 10px;
            background: #5865f2;
            color: #fff;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
        }

        button:hover {
            background: #4752c4;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <h3>Hoş geldin!</h3>
        <p>Kullanıcı adın ve şifrenle giriş yap. Kayıtlı değilsen hesabın otomatik oluşturulur.</p>
        <form method="POST">
            <input type="text" name="username" placeholder="Kullanıcı adı" required>
            <input type="password" name="password" placeholder="Şifre" required>
            <input type="text" name="avatar_url" placeholder="Profil foto URL (isteğe bağlı)">
            <button type="submit">Giriş Yap / Kayıt Ol</button>
        </form>
    </div>
</body>
</html>
